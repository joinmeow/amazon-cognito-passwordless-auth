name: Publish Client Package to npm

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version increment type (patch, minor, major)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: "Release notes (markdown supported)"
        required: false
        type: string

permissions:
  contents: write # version commit/tag/push + GitHub release
  id-token: write # OIDC token for npm Trusted Publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full-length commit SHAs: the enterprise policy requires it for
      # every action (even GitHub-owned ones); tags fail the run at startup.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        # Node >= 22.14 is required for npm Trusted Publishing (OIDC).
        # No registry-url on purpose: with it, setup-node writes an empty
        # `_authToken=` line to .npmrc (NODE_AUTH_TOKEN is unset), which npm
        # treats as "auth configured" and skips the OIDC exchange. Publishing to
        # the default registry (registry.npmjs.org) lets OIDC handle auth.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.x"
      - name: Upgrade npm for Trusted Publishing
        # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 still ships npm 10.x.
        # Pinned (not @latest) to avoid a mutable dependency on the privileged
        # publish path.
        run: npm install -g npm@11.5.1
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      - run: npm ci
      - name: Update package version
        id: version
        run: |
          # Get the current version before bumping
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Update the version according to the bump type
          npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version

          # Get the new version after bumping
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"

          # Set the output for later steps
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: Commit and push changes
        run: |
          git add package.json package-lock.json
          git commit -m "Bump version from ${{ steps.version.outputs.current_version }} to ${{ steps.version.outputs.new_version }}"
          git tag v${{ steps.version.outputs.new_version }}
          git push
          git push --tags
      - run: npm run dist
      # Authenticated via OIDC Trusted Publishing — no NPM_TOKEN. Requires a
      # trusted publisher configured on npmjs.com for this repo + publish.yml.
      # Provenance attestations are generated automatically.
      - run: npm publish
      - name: Create GitHub Release
        # Use the pre-installed gh CLI rather than a third-party action: the
        # repo's Actions allowlist (allowed_actions=selected) blocks
        # softprops/action-gh-release, which fails the run at startup. Inputs
        # are passed via env to avoid shell injection from release_notes.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          CURRENT_VERSION: ${{ steps.version.outputs.current_version }}
          VERSION_BUMP: ${{ github.event.inputs.version_bump }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          {
            echo "## What's Changed"
            echo
            if [ -n "$RELEASE_NOTES" ]; then
              echo "$RELEASE_NOTES"
            else
              echo "Version $NEW_VERSION ($VERSION_BUMP release)"
            fi
            echo
            echo "### Changes since v$CURRENT_VERSION"
            echo
            echo "To install this version:"
            echo '```bash'
            echo "npm install @joinmeow/cognito-passwordless-auth@$NEW_VERSION"
            echo '```'
          } > release_notes.md
          if [ -z "$RELEASE_NOTES" ]; then
            gh release create "v$NEW_VERSION" --title "v$NEW_VERSION" --notes-file release_notes.md --generate-notes
          else
            gh release create "v$NEW_VERSION" --title "v$NEW_VERSION" --notes-file release_notes.md
          fi
